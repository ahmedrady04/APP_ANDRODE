name: tafrigh_app
description: تطبيق التفريغ - استخراج أرقام اللوحات مع GPS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Network
  http: ^1.2.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Audio recording
  record: ^5.1.2

  # Audio playback
  just_audio: ^0.9.42

  # GPS / Location
  geolocator: ^12.0.0

  # File picker (Excel)
  file_picker: ^8.1.2

  # File paths
  path_provider: ^2.1.4

  # Settings storage
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.19.0

  # State management
  provider: ^6.1.2

  # Open URLs / links
  url_launcher: ^6.3.1

  # Permissions dialog
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
